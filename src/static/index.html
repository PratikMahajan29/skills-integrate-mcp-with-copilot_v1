<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mergington High School Activities</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header>
      <h1>Mergington High School</h1>
      <h2>Extracurricular Activities</h2>
    </header>

    <main>
      <section id="auth-container">
        <h3>Student Access</h3>
        <div id="auth-forms">
          <div class="auth-box">
            <h4>Login</h4>
            <form id="login-form">
              <div class="form-group">
                <label for="login-email">Email</label>
                <input type="email" id="login-email" required placeholder="your-email@mergington.edu" />
              </div>
              <div class="form-group">
                <label for="login-password">Password</label>
                <input type="password" id="login-password" required placeholder="Enter password" />
              </div>
              <button type="submit">Login</button>
            </form>
          </div>

          <div class="auth-box">
            <h4>Register</h4>
            <form id="register-form">
              <div class="form-group">
                <label for="register-email">Email</label>
                <input type="email" id="register-email" required placeholder="your-email@mergington.edu" />
              </div>
              <div class="form-group">
                <label for="register-password">Password</label>
                <input type="password" id="register-password" required placeholder="Enter password" />
              </div>
              <div class="form-group">
                <label for="register-branch">Branch</label>
                <select id="register-branch" required>
                  <option value="">-- Select a branch --</option>
                  <option value="CSE">CSE</option>
                  <option value="ECE">ECE</option>
                  <option value="MEC">MEC</option>
                </select>
              </div>
              <button type="submit">Register</button>
            </form>
          </div>
        </div>
      </section>

      <section id="user-info" class="hidden">
        <p>
          Signed in as <strong id="user-email"></strong>
          <span>(Branch: <strong id="user-branch"></strong>)</span>
        </p>
        <button id="logout-btn">Log Out</button>
      </section>

      <section id="activities-container" class="hidden">
        <h3>Available Activities</h3>
        <div id="activities-list">
          <p>Loading activities...</p>
        </div>
      </section>

      <section id="signup-container" class="hidden">
        <h3>Sign Up for an Activity</h3>
        <form id="signup-form">
          <div class="form-group">
            <label for="activity">Select Activity</label>
            <select id="activity" required>
              <option value="">-- Select an activity --</option>
            </select>
          </div>
          <button type="submit">Sign Up</button>
        </form>
      </section>

      <div id="message" class="hidden"></div>
    </main>

    <footer>
      <p>&copy; 2026 Mergington High School</p>
    </footer>

    <script src="app.js"></script>
  </body>
</html>
